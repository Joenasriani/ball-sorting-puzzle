<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ball Sort Puzzle 3D</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body { margin: 0; overflow: hidden; background-color: #0f172a; font-family: sans-serif; }
        canvas { display: block; }
        .glass { background: rgba(30, 41, 59, 0.8); backdrop-filter: blur(12px); border: 1px solid rgba(71, 85, 105, 0.5); }
        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }
        .animate-float { animation: float 3s ease-in-out infinite; }
    </style>
</head>
<body class="text-white">

    <div id="game-container" class="w-full h-screen transition-opacity duration-1000 opacity-30"></div>

    <div id="hud" class="absolute top-0 left-0 w-full p-4 flex justify-between items-center pointer-events-none hidden">
        <div class="glass p-3 rounded-2xl pointer-events-auto">
            <h1 id="level-display" class="text-xl font-bold tracking-tight">Level 1</h1>
            <p class="text-xs text-slate-400">Sort all colors to win</p>
        </div>
        
        <div class="flex gap-2 pointer-events-auto">
            <button id="sound-toggle" onclick="toggleSound()" class="p-3 glass rounded-2xl transition-all active:scale-95 hover:bg-slate-700">
                <i data-lucide="volume-2" class="w-5 h-5"></i>
            </button>
            <button onclick="restartLevel()" class="p-3 glass rounded-2xl transition-all active:scale-95 hover:bg-slate-700">
                <i data-lucide="refresh-cw" class="w-5 h-5"></i>
            </button>
            <div class="px-4 py-2 bg-yellow-500/20 text-yellow-500 border border-yellow-500/30 backdrop-blur-md rounded-2xl flex items-center gap-2">
                <i data-lucide="trophy" class="w-4 h-4"></i>
                <span id="score-display" class="font-bold">0</span>
            </div>
        </div>
    </div>

    <div id="menu" class="absolute inset-0 z-50 flex flex-col items-center justify-center bg-slate-950/40 backdrop-blur-sm p-6 text-center">
        <div class="w-24 h-24 bg-blue-600 rounded-3xl flex items-center justify-center mb-6 shadow-2xl shadow-blue-500/20 animate-float">
            <div class="w-12 h-12 border-4 border-white rounded-full"></div>
        </div>
        <h1 class="text-5xl font-black mb-2 tracking-tighter italic">BALL SORT 3D</h1>
        <p class="text-slate-400 max-w-xs mb-10 leading-relaxed">
            The ultimate color matching puzzle. Relaxing, challenging, and super 3D.
        </p>
        <button onclick="startGame()" class="group flex items-center gap-3 px-10 py-5 bg-blue-600 hover:bg-blue-500 text-white rounded-full font-bold text-xl transition-all hover:scale-105 active:scale-95 shadow-xl shadow-blue-600/30">
            <i data-lucide="play" class="fill-current"></i>
            START GAME
        </button>
        <p class="mt-8 text-xs text-slate-500 flex items-center gap-1 uppercase tracking-widest">
            <i data-lucide="help-circle" class="w-3.5 h-3.5"></i> Tap a tube to move its top ball
        </p>
    </div>

    <div id="win-modal" class="absolute inset-0 z-50 flex items-center justify-center bg-slate-950/60 backdrop-blur-md p-6 hidden">
        <div class="bg-slate-900 border border-slate-700 w-full max-w-sm rounded-[2.5rem] p-8 text-center shadow-2xl">
            <div class="w-20 h-20 bg-green-500/20 text-green-500 rounded-full flex items-center justify-center mx-auto mb-6">
                <i data-lucide="trophy" class="w-10 h-10"></i>
            </div>
            <h2 class="text-3xl font-black mb-2">WELL DONE!</h2>
            <p class="text-slate-400 mb-8">You successfully sorted the level.</p>
            
            <div class="grid grid-cols-2 gap-4">
               <button onclick="restartLevel()" class="py-4 px-6 bg-slate-800 hover:bg-slate-700 rounded-2xl font-bold transition-all">
                REPLAY
              </button>
              <button onclick="nextLevel()" class="py-4 px-6 bg-blue-600 hover:bg-blue-500 rounded-2xl font-bold flex items-center justify-center gap-2 transition-all shadow-lg shadow-blue-600/20">
                NEXT <i data-lucide="chevron-right" class="w-5 h-5"></i>
              </button>
            </div>
        </div>
    </div>

    <div id="hint-text" class="absolute bottom-10 left-1/2 -translate-x-1/2 pointer-events-none opacity-50 text-sm font-medium hidden">
        Tap a tube to pick up a ball
    </div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
                "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        class AudioEngine {
            constructor() {
                this.ctx = null;
                this.soundEnabled = true; 
                this.gainNode = null;
            }

            async init() {
                if (!this.ctx) {
                    this.ctx = new (window.AudioContext || window.webkitAudioContext)();
                    this.gainNode = this.ctx.createGain();
                    this.gainNode.gain.value = 0.08; 
                    this.gainNode.connect(this.ctx.destination);
                }
                if (this.ctx.state === 'suspended') {
                    await this.ctx.resume();
                }
            }

            playSfx(freq, type = 'sine', duration = 0.1, ramp = true) {
                if (!this.soundEnabled || !this.ctx || this.ctx.state !== 'running') return;
                const osc = this.ctx.createOscillator();
                const g = this.ctx.createGain();
                osc.type = type;
                osc.frequency.setValueAtTime(freq, this.ctx.currentTime);
                if (ramp) osc.frequency.exponentialRampToValueAtTime(freq / 2, this.ctx.currentTime + duration);
                
                g.gain.setValueAtTime(0.1, this.ctx.currentTime);
                g.gain.exponentialRampToValueAtTime(0.001, this.ctx.currentTime + duration);
                
                osc.connect(g);
                g.connect(this.gainNode);
                osc.start();
                osc.stop(this.ctx.currentTime + duration);
            }

            playSelect() { this.playSfx(600, 'sine', 0.15); }
            playDrop() { this.playSfx(400, 'sine', 0.2); }
            playInvalid() { this.playSfx(150, 'triangle', 0.3); }
            playWin() {
                [440, 554, 659].forEach((f, i) => {
                    setTimeout(() => this.playSfx(f, 'sine', 0.5, false), i * 100);
                });
            }
        }

        const audio = new AudioEngine();

        const BALL_RADIUS = 0.4;
        const TUBE_HEIGHT = 5.5;
        const COLORS = ['#ef4444', '#3b82f6', '#eab308', '#ec4899', '#8b5cf6', '#10b981', '#f97316'];
        const LEVELS = [
            { tubes: 3, ballsPerTube: 3, colors: 2 },
            { tubes: 4, ballsPerTube: 4, colors: 3 },
            { tubes: 5, ballsPerTube: 4, colors: 4 },
            { tubes: 6, ballsPerTube: 4, colors: 5 },
            { tubes: 7, ballsPerTube: 4, colors: 6 }
        ];

        let scene, camera, renderer, controls;
        let tubeMeshes = [];
        let ballMeshes = [];
        let tubesData = [];
        let selectedTubeIndex = null;
        let animationQueue = [];
        let level = 0;
        let score = 0;
        let isPlaying = false;
        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2();

        lucide.createIcons();

        function init() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color('#0f172a');
            camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(0, 6, 12);
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            renderer.shadowMap.enabled = true;
            document.getElementById('game-container').appendChild(renderer.domElement);

            controls = new OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;
            controls.maxPolarAngle = Math.PI / 2;
            controls.minDistance = 5;
            controls.maxDistance = 20;

            const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
            scene.add(ambientLight);
            const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
            dirLight.position.set(5, 10, 7.5);
            dirLight.castShadow = true;
            scene.add(dirLight);

            const floorGeo = new THREE.BoxGeometry(15, 0.2, 8);
            const floorMat = new THREE.MeshStandardMaterial({ color: '#1e293b' });
            const floor = new THREE.Mesh(floorGeo, floorMat);
            floor.position.y = -0.1;
            floor.receiveShadow = true;
            scene.add(floor);

            window.addEventListener('resize', onWindowResize);
            window.addEventListener('click', onInteraction);
            window.addEventListener('touchstart', onInteraction);
            animate();
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        function generateLevelData(idx) {
            const config = LEVELS[idx % LEVELS.length];
            const { tubes, ballsPerTube, colors } = config;
            let pool = [];
            for (let c = 0; c < colors; c++) {
                for (let b = 0; b < ballsPerTube; b++) pool.push(c);
            }
            for (let i = pool.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [pool[i], pool[j]] = [pool[j], pool[i]];
            }
            const newTubes = Array.from({ length: tubes }, () => []);
            for (let i = 0; i < pool.length; i++) {
                const tIdx = Math.floor(i / ballsPerTube);
                newTubes[tIdx].push(pool[i]);
            }
            return newTubes;
        }

        function setupLevel() {
            tubeMeshes.forEach(m => scene.remove(m.parent));
            ballMeshes.forEach(m => scene.remove(m));
            tubeMeshes = [];
            ballMeshes = [];
            selectedTubeIndex = null;
            animationQueue = [];

            tubesData = generateLevelData(level);
            const spacing = 2.2;
            const offset = ((tubesData.length - 1) * spacing) / 2;

            tubesData.forEach((contents, i) => {
                const tubeGroup = new THREE.Group();
                tubeGroup.position.set(i * spacing - offset, 0, 0);
                const stickGeo = new THREE.CylinderGeometry(0.05, 0.05, TUBE_HEIGHT, 16);
                const stickMat = new THREE.MeshStandardMaterial({ color: '#d4d4d8' });
                const stick = new THREE.Mesh(stickGeo, stickMat);
                stick.position.y = TUBE_HEIGHT / 2;
                tubeGroup.add(stick);
                const baseGeo = new THREE.CylinderGeometry(0.6, 0.6, 0.1, 32);
                const baseMat = new THREE.MeshStandardMaterial({ color: '#475569' });
                const base = new THREE.Mesh(baseGeo, baseMat);
                tubeGroup.add(base);
                const hitGeo = new THREE.CylinderGeometry(0.8, 0.8, TUBE_HEIGHT, 16);
                const hitMat = new THREE.MeshBasicMaterial({ transparent: true, opacity: 0 });
                const hitMesh = new THREE.Mesh(hitGeo, hitMat);
                hitMesh.position.y = TUBE_HEIGHT / 2;
                hitMesh.userData = { type: 'tube', index: i };
                tubeGroup.add(hitMesh);
                scene.add(tubeGroup);
                tubeMeshes.push(hitMesh);

                contents.forEach((colorIdx, ballIdx) => {
                    const ball = createBall(COLORS[colorIdx]);
                    ball.position.set(i * spacing - offset, ballIdx * (BALL_RADIUS * 2.1) + BALL_RADIUS, 0);
                    ball.userData = { colorIdx, tubeIdx: i };
                    scene.add(ball);
                    ballMeshes.push(ball);
                });
            });
            document.getElementById('level-display').innerText = `Level ${level + 1}`;
            document.getElementById('score-display').innerText = score;
        }

        function createBall(color) {
            const geo = new THREE.SphereGeometry(BALL_RADIUS, 32, 32);
            const mat = new THREE.MeshStandardMaterial({ color, roughness: 0.3, metalness: 0.2 });
            const ball = new THREE.Mesh(geo, mat);
            ball.castShadow = true;
            return ball;
        }

        async function onInteraction(e) {
            await audio.init(); 
            if (!isPlaying || animationQueue.length > 0) return;
            const x = e.clientX || (e.touches && e.touches[0].clientX);
            const y = e.clientY || (e.touches && e.touches[0].clientY);
            mouse.x = (x / window.innerWidth) * 2 - 1;
            mouse.y = -(y / window.innerHeight) * 2 + 1;
            raycaster.setFromCamera(mouse, camera);
            const intersects = raycaster.intersectObjects(tubeMeshes);

            if (intersects.length > 0) {
                const tubeIdx = intersects[0].object.userData.index;
                processMove(tubeIdx);
            } else if (selectedTubeIndex !== null) {
                moveBallVisual(selectedTubeIndex, 'down');
                selectedTubeIndex = null;
                updateHint();
            }
        }

        function processMove(tubeIdx) {
            if (selectedTubeIndex === null) {
                if (tubesData[tubeIdx].length > 0) {
                    audio.playSelect();
                    selectedTubeIndex = tubeIdx;
                    moveBallVisual(tubeIdx, 'up');
                }
            } else {
                const fromIdx = selectedTubeIndex;
                const toIdx = tubeIdx;
                if (fromIdx === toIdx) {
                    moveBallVisual(fromIdx, 'down');
                    selectedTubeIndex = null;
                } else {
                    const fromTube = tubesData[fromIdx];
                    const toTube = tubesData[toIdx];
                    const ballColor = fromTube[fromTube.length - 1];
                    const canMove = toTube.length < LEVELS[level % LEVELS.length].ballsPerTube && 
                                    (toTube.length === 0 || toTube[toTube.length - 1] === ballColor);
                    if (canMove) {
                        audio.playDrop();
                        const ball = fromTube.pop();
                        toTube.push(ball);
                        animateBallTransition(fromIdx, toIdx);
                        selectedTubeIndex = null;
                    } else {
                        audio.playInvalid();
                        moveBallVisual(fromIdx, 'down');
                        selectedTubeIndex = null;
                    }
                }
            }
            updateHint();
        }

        function moveBallVisual(tubeIdx, direction) {
            const balls = ballMeshes.filter(b => b.userData.tubeIdx === tubeIdx);
            if (balls.length === 0) return;
            const topBall = balls.reduce((a, b) => a.position.y > b.position.y ? a : b);
            const targetY = direction === 'up' ? TUBE_HEIGHT + 0.5 : (tubesData[tubeIdx].length - 1) * (BALL_RADIUS * 2.1) + BALL_RADIUS;
            animationQueue.push({ mesh: topBall, target: new THREE.Vector3(topBall.position.x, targetY, 0) });
        }

        function animateBallTransition(fromIdx, toIdx) {
            const balls = ballMeshes.filter(b => b.userData.tubeIdx === fromIdx);
            const topBall = balls.reduce((a, b) => a.position.y > b.position.y ? a : b);
            const spacing = 2.2;
            const offset = ((tubesData.length - 1) * spacing) / 2;
            const targetX = toIdx * spacing - offset;
            const targetY = (tubesData[toIdx].length - 1) * (BALL_RADIUS * 2.1) + BALL_RADIUS;
            animationQueue.push({ mesh: topBall, target: new THREE.Vector3(topBall.position.x, TUBE_HEIGHT + 0.8, 0) });
            animationQueue.push({ mesh: topBall, target: new THREE.Vector3(targetX, TUBE_HEIGHT + 0.8, 0) });
            animationQueue.push({ mesh: topBall, target: new THREE.Vector3(targetX, targetY, 0) });
            topBall.userData.tubeIdx = toIdx;
        }

        function animate() {
            requestAnimationFrame(animate);
            controls.update();
            if (animationQueue.length > 0) {
                const anim = animationQueue[0];
                anim.mesh.position.lerp(anim.target, 0.15);
                if (anim.mesh.position.distanceTo(anim.target) < 0.05) {
                    anim.mesh.position.copy(anim.target);
                    animationQueue.shift();
                    if (animationQueue.length === 0) checkWin();
                }
            }
            renderer.render(scene, camera);
        }

        function checkWin() {
            const config = LEVELS[level % LEVELS.length];
            const isWon = tubesData.every(tube => {
                if (tube.length === 0) return true;
                if (tube.length !== config.ballsPerTube) return false;
                return tube.every(c => c === tube[0]);
            });
            if (isWon) {
                audio.playWin();
                score += 100;
                document.getElementById('score-display').innerText = score;
                document.getElementById('win-modal').classList.remove('hidden');
                document.getElementById('hint-text').classList.add('hidden');
            }
        }

        function updateHint() {
            const hint = document.getElementById('hint-text');
            if (selectedTubeIndex === null) {
                hint.innerText = "Tap a tube to pick up a ball";
                hint.classList.remove('text-blue-400', 'animate-pulse');
            } else {
                hint.innerText = "Select target tube";
                hint.classList.add('text-blue-400', 'animate-pulse');
            }
        }

        window.toggleSound = async () => {
            await audio.init(); 
            audio.soundEnabled = !audio.soundEnabled;
            const btn = document.getElementById('sound-toggle');
            
            if (audio.soundEnabled) {
                btn.classList.add('bg-blue-600/30', 'text-blue-400');
                btn.innerHTML = '<i data-lucide="volume-2" class="w-5 h-5"></i>';
            } else {
                btn.classList.remove('bg-blue-600/30', 'text-blue-400');
                btn.innerHTML = '<i data-lucide="volume-x" class="w-5 h-5"></i>';
            }
            lucide.createIcons();
        };

        window.startGame = async () => {
            await audio.init(); 
            document.getElementById('menu').classList.add('hidden');
            document.getElementById('hud').classList.remove('hidden');
            document.getElementById('hint-text').classList.remove('hidden');
            document.getElementById('game-container').style.opacity = "1";
            isPlaying = true;
            setupLevel();
            
            const btn = document.getElementById('sound-toggle');
            if (audio.soundEnabled) btn.classList.add('bg-blue-600/30', 'text-blue-400');
        };

        window.restartLevel = () => {
            document.getElementById('win-modal').classList.add('hidden');
            document.getElementById('hint-text').classList.remove('hidden');
            setupLevel();
        };

        window.nextLevel = () => { level++; window.restartLevel(); };
        window.onload = init;
    </script>
</body>
</html>
